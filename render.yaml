services:
  - type: web
    name: freight-cost-calculator
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GITHUB_TOKEN
        sync: false
        placeholder: "Your GitHub Personal Access Token (for permanent saving)"
      - key: GITHUB_OWNER
        value: "rutujak-bora"
      - key: GITHUB_REPO
        value: "cost-calculator"
      - key: GITHUB_BRANCH
        value: "main"
